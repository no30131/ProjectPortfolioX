<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>作品集展示</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* 樣式化區塊的外觀和排版 */
	.portfolio-section {
	border: 1px solid #ccc;
	padding: 20px;
	margin: 20px 0;
	background-color: #f9f9f9;
	}

	/* 標題的樣式 */
	.portfolio-section h2 {
	  font-size: 24px;
	  margin-bottom: 10px;
	}

	/* 段落文本的樣式 */
	.portfolio-section p {
	  font-size: 16px;
	  line-height: 1.6;
	}

	/* 圖片的樣式 */
	.portfolio-section img {
	  max-width: 100%;
	  height: auto;
	  display: block;
	  margin-bottom: 15px;
	}

	/* 影片播放器的樣式 */
	.portfolio-section video {
	  max-width: 100%;
	  height: auto;
	  margin-bottom: 15px;
	}

	/* 簡報的樣式 */
	.portfolio-section iframe {
	  width: 100%;
	  max-width: 100%;
	  height: 400px;
	  border: none;
	  margin-bottom: 15px;
	}

  </style>
</head>
<body>

<!-- Java Learning Project Dog Dodge 區塊 -->
<section id="java_learning" class="portfolio-section">
  <h2>Java Learning Project Dog Dodge</h2>
  <p>這裡是 Java Learning Project Dog Dodge 的說明</p>
  <img src="java_learning_image.jpg" alt="Java Learning Project Dog Dodge">
  <video controls>
    <source src="java_learning_video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <iframe src="java_learning_presentation.pdf" width="600" height="400"></iframe>
</section>

    Your browser does not support the video tag.
  </video>

</section>

</html>
